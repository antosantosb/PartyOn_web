version: "3.8"

services:
  db:
    image: postgres:15
    container_name: partyon_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: partyon
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: partyon_backend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@db:5432/partyon?schema=public
      - PORT=3000
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      # ── Frontend origin (CORS) — set your production domain here ──────────
      # - FRONTEND_URL=https://partyon.tudominio.com
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - db
    command: >
      sh -c "npx prisma db push --accept-data-loss && 
             npx prisma db seed && 
             node dist/index.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # VITE_* vars must be passed at BUILD time — Vite bakes them into the JS bundle
        # Set these in your root .env file or export them in your shell before running
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:3000/api}
        VITE_STRIPE_PUBLIC_KEY: ${VITE_STRIPE_PUBLIC_KEY}
    container_name: partyon_frontend
    restart: always
    ports:
      # Port 80 is taken by the other project's Nginx.
      # We expose on 8080 on the host so the Nginx proxy can reach us.
      - "8080:80"
    depends_on:
      - backend

volumes:
  db_data:
  uploads_data:
