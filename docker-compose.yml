version: "3.8"

services:
  db:
    image: postgres:15
    container_name: partyon_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: partyon
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: partyon_backend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@db:5432/partyon?schema=public
      - PORT=3000
      # ── Stripe ──────────────────────────────────────────────────────────────
      # Docker Compose reads ${STRIPE_SECRET_KEY} from the host environment OR
      # from a .env file placed next to docker-compose.yml (root of the project).
      # NEVER hardcode the real secret key here — .env is gitignored.
      # Test keys start with sk_test_  |  Live keys start with sk_live_
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      # ── Frontend origin (CORS) ───────────────────────────────────────────────
      # Uncomment and set to your production domain before going live:
      # - FRONTEND_URL=https://yourdomain.com
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - db

volumes:
  db_data:
  uploads_data:
